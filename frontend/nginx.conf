server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Inject the API token server-side (envsubst fills it from the
        # container env at startup) so the browser never handles it. With no
        # token configured this sends "Bearer " and the backend, also
        # unconfigured, ignores it.
        proxy_set_header Authorization "Bearer ${RHINOSCAN_API_TOKEN}";
    }
}
